<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Quiz – QuizCraft</title>
  <link rel="stylesheet" href="student_view.css" />
</head>
<body>

  <!-- ══ NAME ENTRY SCREEN ══ -->
  <div class="card" id="nameScreen">
    <div>
      <p class="question-counter" id="quizTitleDisplay">Loading quiz…</p>
      <p class="question-text" id="quizMetaDisplay" style="font-size:0.9rem;color:#888;margin-bottom:28px;"></p>

      <div style="margin-bottom:16px;">
        <label style="display:block;font-size:0.82rem;font-weight:600;color:#444;margin-bottom:6px;letter-spacing:0.03em;">Your Name</label>
        <input type="text" id="studentNameInput" placeholder="Enter your full name"
          style="width:100%;padding:10px 14px;border:1.5px solid #dde0ee;border-radius:10px;font-size:0.93rem;font-family:inherit;color:#222;outline:none;" />
      </div>

      <p class="error-msg hidden" id="nameError" style="color:#e05252;font-size:0.83rem;margin-bottom:10px;">Please enter your name.</p>
    </div>

    <div class="nav-buttons" style="justify-content:flex-end;">
      <button class="nav-btn btn-next" onclick="startQuiz()">Start Quiz →</button>
    </div>
  </div>

  <!-- ══ QUIZ SCREEN ══ -->
  <div class="card hidden" id="quizScreen">

    <div>
      <!-- Timer + counter row -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <p class="question-counter" id="questionCounter">Question 1 of 5</p>
        <span id="timerDisplay" style="font-size:0.85rem;font-weight:700;color:#0284C7;background:#e0f2fe;padding:4px 12px;border-radius:20px;">15:00</span>
      </div>

      <!-- Progress bar -->
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill" style="width: 0%;"></div>
      </div>

      <!-- Question -->
      <p class="question-text" id="questionText"></p>

      <!-- Options -->
      <ul class="options-list" id="optionsList"></ul>
    </div>

    <!-- Navigation -->
    <div class="nav-buttons">
      <button class="nav-btn btn-prev" id="prevBtn" onclick="goToPrev()">← Previous</button>
      <button class="nav-btn btn-next" id="nextBtn" onclick="goToNext()">Next →</button>
    </div>

  </div>

  <!-- ══ SCORE SCREEN ══ -->
  <div class="score-card hidden" id="scoreScreen">

    <div class="score-heading" id="scoreHeading">Your Score</div>

    <div class="score-row">
      <span class="score-label">Correct</span>
      <span class="score-value correct" id="correctCount">—</span>
    </div>
    <div class="score-row">
      <span class="score-label">Incorrect</span>
      <span class="score-value wrong" id="incorrectCount">—</span>
    </div>
    <div class="score-row">
      <span class="score-label">Unanswered</span>
      <span class="score-value partial" id="partialCount">—</span>
    </div>
    <div class="score-row">
      <span class="score-label">Total Marks</span>
      <span class="score-value total" id="totalMarks">—</span>
    </div>

    <div class="rank-section">
      <span class="rank-label">Grade</span>
      <span class="rank-badge" id="rankBadge">—</span>
    </div>

    <!-- Answers review (if teacher enabled it) -->
    <div id="answersReview" class="hidden" style="margin-top:22px;">
      <h4 style="font-size:0.9rem;font-weight:700;color:#1e293b;margin-bottom:12px;">Answer Review</h4>
      <div id="answersReviewList"></div>
    </div>

  </div>

  <script src="student_view.js"></script>
</body>
</html>
